services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myassistant-postgres
    environment:
      POSTGRES_DB: myassistant
      POSTGRES_USER: ${DB_USERNAME:-myassistant}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
